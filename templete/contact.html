{% extends "base.html" %}

{% block title %}Contact - Weather Prediction{% endblock %}

{% block content %}
<div class="info-page">
    <h2>Contact Us</h2>
    <p>Have a question, found a bug, or want to suggest a feature? Send a message below.</p>

    <form id="contactForm" class="contact-form">
        <input type="text" id="contactName" placeholder="Your name" required>
        <input type="email" id="contactEmail" placeholder="Your email" required>
        <textarea id="contactMessage" rows="5" placeholder="Your message" required></textarea>
        <button type="submit">Send Message</button>
    </form>

    <div id="contactConfirmation" class="contact-confirmation" style="display:none;">
        Thanks! Your message has been received.
    </div>

    <a href="/" class="btn">Back to Home</a>
</div>

<script>
    document.getElementById('contactForm').addEventListener('submit', function (e) {
        e.preventDefault();
        // NOTE: this is a frontend-only demo. To actually send these messages,
        // wire this up to a backend route (e.g. /contact POST) that emails you
        // or saves to a database.
        document.getElementById('contactForm').style.display = 'none';
        document.getElementById('contactConfirmation').style.display = 'block';
    });
</script>
{% endblock %}
